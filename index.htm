<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Hermes OCR 测试前端</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .box { border: 2px dashed #ccc; padding: 30px; margin: 20px auto; width: 400px; }
        button { padding: 10px 20px; background-color: #ff9900; color: white; border: none; cursor: pointer; font-size: 16px; }
        /* 为渲染出的公式单独加一个漂亮的展示框 */
        #rendered-math { 
            font-size: 28px; 
            margin-top: 20px; 
            padding: 20px; 
            border: 1px solid #ddd; 
            background: #fcfcfc; 
            display: none; 
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>Hermes Math-OCR 上传测试</h2>
    <div class="box">
        <input type="file" id="imageInput" accept="image/*">
        <br><br>
        <button onclick="uploadImage()">上传并识别公式</button>
    </div>
    
    <h3>视觉渲染结果：</h3>
    <div id="rendered-math"></div>

    <h3>原始 API 返回日志：</h3>
    <pre id="result" style="background: #f4f4f4; padding: 15px; text-align: left;"></pre>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) {
                alert("请先选择一张图片！");
                return;
            }

            const formData = new FormData();
            formData.append('formula_image', fileInput.files[0]);

            document.getElementById('result').innerText = "API 请求中...";
            document.getElementById('rendered-math').style.display = 'none';

            try {
                const response = await fetch(' https://fm0yukws27.execute-api.us-east-1.amazonaws.com/Prod/api/v1/recognize', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);

                // 核心逻辑：如果后端成功返回了 recognized_latex
                if (data.recognized_latex) {
                    const mathDiv = document.getElementById('rendered-math');
                    mathDiv.style.display = 'block';
                    
                    // 使用标准的公式块语法包裹 LaTeX
                    mathDiv.innerText = '\\[' + data.recognized_latex + '\\]';
                    
                    // 触发 MathJax 的异步重绘功能
                    MathJax.typesetPromise([mathDiv]).catch((err) => console.error('MathJax 渲染失败:', err));
                }

            } catch (error) {
                document.getElementById('result').innerText = "请求失败: " + error;
            }
        }
    </script>
</body>
</html>
