<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Hermes OCR 测试前端</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .box { border: 2px dashed #ccc; padding: 30px; margin: 20px auto; width: 400px; }
        button { padding: 10px 20px; background-color: #ff9900; color: white; border: none; cursor: pointer; font-size: 16px; }
        #rendered-math { font-size: 28px; margin-top: 20px; padding: 20px; border: 1px solid #ddd; background: #fcfcfc; display: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Hermes Math-OCR 上传测试</h2>
    <div class="box">
        <input type="file" id="imageInput" accept="image/*">
        <br><br>
        <button onclick="uploadImage()">上传并识别公式</button>
    </div>
    
    <h3>视觉渲染结果：</h3>
    <div id="rendered-math"></div>

    <h3>原始 API 返回日志：</h3>
    <pre id="result" style="background: #f4f4f4; padding: 15px; text-align: left;"></pre>

    <script>
        // ⚠️ 第一步：记得把下面这个地址，换成你真实的 AWS API Gateway 地址 ⚠️
        const API_BASE_URL = "https://fm0yukws27.execute-api.us-east-1.amazonaws.com//Prod";

        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            if (!file) {
                alert("请先选择一张图片！");
                return;
            }

            const resultDiv = document.getElementById('result');
            const mathDiv = document.getElementById('rendered-math');
            mathDiv.style.display = 'none';

            try {
                // 步骤 1：向 Lambda 索要预签名链接
                resultDiv.innerText = "[1/3] 正在获取 S3 安全上传凭证...";
                const urlResponse = await fetch(`${API_BASE_URL}/api/v1/upload-url`);
                const urlData = await urlResponse.json();
                
                if (!urlData.upload_url) throw new Error("未能获取凭证");

                // 步骤 2：直传 S3
                resultDiv.innerText = "[2/3] 正在将高清图片直传至云端存储桶...";
                const s3Response = await fetch(urlData.upload_url, {
                    method: 'PUT',
                    headers: { 'Content-Type': file.type },
                    body: file
                });

                if (!s3Response.ok) throw new Error("直传 S3 失败");

                // 步骤 3：通知 Lambda 去找 Kaggle 摇人识别
                resultDiv.innerText = "[3/3] 上传完毕！正在呼叫云端 Qwen 大模型进行识别...";
                console.log("准备发给后端的 file_name 是:", urlData.file_name); 

                // 💡 这里的 fetch 已经去掉了 headers，用来绕过浏览器的跨域拦截
                const recognizeResponse = await fetch(`${API_BASE_URL}/api/v1/recognize`, {
                    method: 'POST',
                    body: JSON.stringify({ file_name: urlData.file_name })
                });

                const finalData = await recognizeResponse.json();
                resultDiv.innerText = "请求完成:\n" + JSON.stringify(finalData, null, 2);

                if (finalData.recognized_latex) {
                    mathDiv.style.display = 'block';
                    mathDiv.innerText = '\\[' + finalData.recognized_latex + '\\]';
                    MathJax.typesetPromise([mathDiv]);
                }

            } catch (error) {
                resultDiv.innerText = "流程中断报错: " + error.message;
            }
        }
    </script>
</body>
</html>
